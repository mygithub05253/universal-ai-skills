<!doctype html>
<!--
  project-dashboard 스켈레톤 — 이 파일을 복제해 {{...}} 자리를 실제 데이터로 채운다.
  규칙: 단일 파일 자체완결 / CSS 막대는 항상(오프라인도) 표시 / 도넛은 Chart.js(CDN).
  전체 % = Σ(weight×completion)/Σ(weight). 팀원 % = 담당 기능만으로 동일 계산.
-->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{PROJECT_NAME}} — 진행 대시보드</title>
<style>
  :root{ --bg:#0f1117; --card:#171a23; --line:#262b38; --txt:#e6e8ee; --mut:#9aa3b2;
         --done:#22c55e; --wip:#f59e0b; --todo:#4b5563; --accent:#6366f1; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--txt);
        font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif; }
  .wrap{ max-width:1040px; margin:0 auto; padding:28px 20px 60px; }
  header{ display:flex; flex-wrap:wrap; align-items:center; gap:20px;
          border-bottom:1px solid var(--line); padding-bottom:20px; margin-bottom:24px; }
  .title h1{ margin:0 0 4px; font-size:24px; }
  .title .meta{ color:var(--mut); font-size:13px; }
  .overall{ margin-left:auto; display:flex; align-items:center; gap:16px; }
  .overall .big{ font-size:40px; font-weight:700; }
  .donut{ width:110px; height:110px; }
  h2{ font-size:15px; color:var(--mut); text-transform:uppercase; letter-spacing:.04em;
      margin:28px 0 12px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .row{ display:grid; grid-template-columns:1fr 56px 64px; gap:12px; align-items:center;
        padding:9px 0; border-bottom:1px solid var(--line); }
  .row:last-child{ border-bottom:0; }
  .row .name{ font-size:14px; }
  .row .w{ color:var(--mut); font-size:12px; text-align:right; }
  .row .pct{ font-variant-numeric:tabular-nums; text-align:right; font-size:13px; }
  .bar{ grid-column:1 / -1; height:7px; border-radius:6px; background:#11141c; overflow:hidden; }
  .bar > i{ display:block; height:100%; border-radius:6px; }
  .s-done > i{ background:var(--done); } .s-wip > i{ background:var(--wip); } .s-todo > i{ background:var(--todo); }
  .members{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  .member h3{ margin:0 0 2px; font-size:15px; }
  .member .role{ color:var(--mut); font-size:12px; margin-bottom:10px; }
  .tag{ display:inline-block; font-size:11px; color:var(--mut); border:1px solid var(--line);
        border-radius:999px; padding:1px 8px; margin:2px 4px 0 0; }
  .notes{ white-space:pre-wrap; line-height:1.6; font-size:14px; }
  footer{ color:var(--mut); font-size:12px; margin-top:30px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title">
      <h1>{{PROJECT_NAME}}</h1>
      <!-- 마일스톤 / 생성일시(KST) -->
      <div class="meta">🎯 {{MILESTONE}} · 생성 {{GENERATED_AT_KST}}</div>
    </div>
    <div class="overall">
      <canvas class="donut" id="overallDonut" data-pct="{{OVERALL_PCT}}"></canvas>
      <div><div class="big">{{OVERALL_PCT}}%</div><div class="meta">전체 진척률</div></div>
    </div>
  </header>

  <h2>기능별 진척 (명세 기반 · 가중치)</h2>
  <div class="card">
    <!-- 각 기능 1행. 상태색 클래스: s-done / s-wip / s-todo -->
    <div class="row s-done">
      <div class="name">예약 생성 API</div><div class="w">w3</div><div class="pct">100%</div>
      <div class="bar"><i style="width:100%"></i></div>
    </div>
    <!-- ...반복... -->
  </div>

  <!-- 팀 프로젝트일 때만 렌더. 개인 프로젝트면 이 섹션 통째로 생략 -->
  <h2>팀원별 진척</h2>
  <div class="members">
    <div class="card member">
      <h3>홍길동 <span class="pct" style="float:right">100%</span></h3>
      <div class="role">Backend</div>
      <div class="bar s-done"><i style="width:100%"></i></div>
      <div style="margin-top:10px">
        <span class="tag">예약 생성 API</span><span class="tag">알림 메일</span>
      </div>
    </div>
    <!-- ...멤버 반복... -->
  </div>

  <h2>리스크 & 다음 초점</h2>
  <div class="card notes">{{STATUS_NOTES}}</div>

  <footer>spec-based weighted progress · generated by project-dashboard skill</footer>
</div>

<!-- 도넛 차트(선택, 온라인). CDN 실패해도 위 숫자/막대는 그대로 보임 -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
  // data-pct 를 가진 모든 canvas 를 도넛으로 렌더
  window.addEventListener('load', function () {
    if (!window.Chart) return; // 오프라인 폴백: 차트 없이 숫자/막대만
    document.querySelectorAll('canvas[data-pct]').forEach(function (c) {
      var pct = Number(c.getAttribute('data-pct')) || 0;
      new Chart(c, {
        type: 'doughnut',
        data: { datasets: [{ data: [pct, 100 - pct],
          backgroundColor: ['#6366f1', '#262b38'], borderWidth: 0 }] },
        options: { cutout: '72%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
      });
    });
  });
</script>
</body>
</html>
